name: paroisse_tresorerie
description: Gestion hors ligne de la trésorerie de la paroisse Saint François d'Assise.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  sqflite: ^2.3.3+1
  path: ^1.9.0
  intl: ">=0.19.0 <0.21.0"
  shared_preferences: ^2.2.3
  pdf: ^3.11.0
  printing: ^5.13.1
  share_plus: ^10.0.0
  path_provider: ^2.1.3
  file_picker: ^8.0.6

  # Image de Saint François utilisée comme icône Android.
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11

flutter_launcher_icons:
  android: true
  image_path: "assets/icons/saint_francois_app_icon.png"
  adaptive_icon_background: "#2E6B45"
  adaptive_icon_foreground: "assets/icons/saint_francois_app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/saint_francois_app_icon.png
