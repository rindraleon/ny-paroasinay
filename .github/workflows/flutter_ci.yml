name: Flutter CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  quality-and-test:
    name: Analyse et tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Installer les dépendances
        run: flutter pub get
      - name: Vérifier le formatage
        run: dart format --output=none --set-exit-if-changed lib test
      - name: Analyse statique (linter)
        run: flutter analyze
      - name: Tests unitaires
        run: flutter test

  android-build:
    name: Construire Android
    needs: quality-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      # Génère les fichiers Android au premier passage. Gardez le dossier android/
      # dans Git après le premier lancement local de `flutter create --platforms=android .`.
      - name: Générer la plateforme Android si elle manque
        run: test -d android || flutter create --platforms=android --org mg.tsararivotra .
      - name: Définir le nom et générer l’icône Android
        run: |
          dart run tool/prepare_android.dart
          dart run flutter_launcher_icons
      - name: Construire APK de démonstration
        run: flutter build apk --release
      - name: Construire Android App Bundle
        run: flutter build appbundle --release
      - name: Conserver les fichiers Android
        uses: actions/upload-artifact@v4
        with:
          name: paroisse-tresorerie-android
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30

  github-release:
    name: Publier la version GitHub
    needs: android-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: paroisse-tresorerie-android
          path: release-files
      - name: Créer la release et joindre APK/AAB
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-files/**
